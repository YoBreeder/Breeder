<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- App identity -->
    <title>yoBreeder</title>
    <meta name="description" content="The voice-first breeding app" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- iOS PWA — makes it feel fully native when added to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="yoBreeder" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-512.svg" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.svg" />

    <!-- iOS splash / safe area -->
    <meta name="mobile-web-app-capable" content="yes" />
    <style>
      body { margin: 0; padding: 0; background: #0d0b1e; }
      /* Respect iPhone notch / home indicator */
      #root { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        // Unregister all old service workers first, then register fresh
        navigator.serviceWorker.getRegistrations().then(regs => {
          Promise.all(regs.map(r => r.unregister())).then(() => {
            navigator.serviceWorker.register('/sw.js').catch(() => {})
          })
        })
      }
    </script>
  </body>
</html>
